# render.yaml — Render.com blueprint
# Deploys backend + frontend + postgres as a single service group
# Push to GitHub and connect at https://dashboard.render.com

services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: rag-hybrid-search-backend
    runtime: python
    plan: starter          # Free tier — upgrade for production
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rag-postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false        # You set this manually in Render dashboard
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://rag-hybrid-search-frontend.onrender.com"
    healthCheckPath: /health

  # ── Frontend (Static site) ───────────────────────────────────────────
  - type: web
    name: rag-hybrid-search-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://rag-hybrid-search-backend.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ──────────────────────────────────────────────
databases:
  - name: rag-postgres
    plan: starter          # Free tier PostgreSQL on Render
    databaseName: rag_db
    user: postgres
